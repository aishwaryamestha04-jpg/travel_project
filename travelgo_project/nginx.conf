# Nginx Configuration for TravelGo Production Deployment
# ========================================================
# This configuration file should be placed in /etc/nginx/sites-available/
# and symlinked to /etc/nginx/sites-enabled/

# Upstream configuration for Gunicorn
upstream travelgo_app {
    server 127.0.0.1:5000;
    keepalive 32;
}

# HTTP server - redirect to HTTPS in production
server {
    listen 80;
    listen [::]:80;
    server_name _;

    # Redirect to HTTPS (uncomment in production)
    # return 301 https://$server_name$request_uri;

    # For now, serve the app directly
    location / {
        proxy_pass http://travelgo_app;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # WebSocket support (if needed)
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        # Timeouts
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;

        # Buffering
        proxy_buffering on;
        proxy_buffer_size 4k;
        proxy_buffers 8 4k;
        proxy_busy_buffers_size 8k;
    }

    # Static files caching
    location /static/ {
        alias /var/www/travelgo/static/;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # Health check endpoint
    location /health {
        proxy_pass http://travelgo_app;
        access_log off;
    }

    # Deny access to hidden files
    location ~ /\. {
        deny all;
    }

    # Custom error pages
    error_page 502 503 504 /50x.html;
    location = /50x.html {
        root /usr/share/nginx/html;
    }
}

